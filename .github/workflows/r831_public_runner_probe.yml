name: R831 Public Runner Probe

on:
  push:
    branches: [agent/r831-public-runner-probe]
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Runner is alive
        run: |
          set -Eeuo pipefail
          echo R831_PUBLIC_RUNNER_PROVISIONING=PASS
          uname -a
          df -h
