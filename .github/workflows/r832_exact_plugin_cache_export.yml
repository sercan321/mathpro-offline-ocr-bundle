name: R832 Exact Plugin Cache Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_toolchain_trigger/**'
      - '.github/workflows/r832_exact_plugin_cache_export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1, show-progress: false}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - name: Resolve exact Gradle plugin closure and replay offline
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="$RUNNER_TEMP/r832-exact-plugin-cache"
          mkdir -p "$ROOT/project" "$ROOT/export"
          curl --fail --location --retry 5 --retry-delay 3 --silent --show-error -o "$ROOT/gradle-8.7-bin.zip" https://services.gradle.org/distributions/gradle-8.7-bin.zip
          echo '544c35d6bd849ae8a5ed0bcea39ba677dc40f49df7d1835561582da2009b961d  gradle-8.7-bin.zip' > "$ROOT/expected.sha256"
          (cd "$ROOT" && sha256sum -c expected.sha256)
          unzip -q "$ROOT/gradle-8.7-bin.zip" -d "$ROOT"
          cat > "$ROOT/project/settings.gradle" <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          plugins {
              id 'com.android.application' version '8.6.1' apply false
              id 'org.jetbrains.kotlin.android' version '2.1.0' apply false
              id 'com.chaquo.python' version '17.0.0' apply false
          }
          rootProject.name = 'r832_exact_plugin_cache'
          EOF
          sed -i 's/^          //' "$ROOT/project/settings.gradle"
          cat > "$ROOT/project/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application' apply false
              id 'org.jetbrains.kotlin.android' apply false
              id 'com.chaquo.python' apply false
          }
          EOF
          sed -i 's/^          //' "$ROOT/project/build.gradle"
          export GRADLE_USER_HOME="$HOME/.gradle"
          cd "$ROOT/project"
          "$ROOT/gradle-8.7/bin/gradle" --no-daemon help 2>&1 | tee "$ROOT/export/plugin-resolution.log"
          "$ROOT/gradle-8.7/bin/gradle" --offline --no-daemon help 2>&1 | tee "$ROOT/export/plugin-offline-replay.log"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.6.1"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.1.0"
          tar --zstd -cf "$ROOT/export/gradle-plugin-cache.tar.zst" -C "$HOME" .gradle
          split -b 300000000 -d -a 2 "$ROOT/export/gradle-plugin-cache.tar.zst" "$ROOT/export/gradle-plugin-cache.chunk-"
          rm "$ROOT/export/gradle-plugin-cache.tar.zst"
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'plugin-cache.*' -printf '%f\n' | sort | xargs sha256sum > plugin-cache.sha256)
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'plugin-cache.*' -printf '%f\n' | sort | xargs stat -c '%s %n' > plugin-cache.size)
      - uses: actions/upload-artifact@v4
        with:
          name: r832-exact-plugin-cache-diagnostics
          path: |
            ${{ runner.temp }}/r832-exact-plugin-cache/export/*.log
            ${{ runner.temp }}/r832-exact-plugin-cache/export/plugin-cache.sha256
            ${{ runner.temp }}/r832-exact-plugin-cache/export/plugin-cache.size
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with: {name: r832-plugin-cache-00, path: '${{ runner.temp }}/r832-exact-plugin-cache/export/gradle-plugin-cache.chunk-00', compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-plugin-cache-01, path: '${{ runner.temp }}/r832-exact-plugin-cache/export/gradle-plugin-cache.chunk-01', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-plugin-cache-02, path: '${{ runner.temp }}/r832-exact-plugin-cache/export/gradle-plugin-cache.chunk-02', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-plugin-cache-03, path: '${{ runner.temp }}/r832-exact-plugin-cache/export/gradle-plugin-cache.chunk-03', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
