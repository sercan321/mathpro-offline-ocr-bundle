name: Q389R8A R4 Paddle Lite multi-optimizer PIR re-export Formula OCR artifact proof bundle

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag for successful .nb bundle
        required: true
        default: q389r8a-r4-paddle-lite-multi-optimizer-formula-ocr-bundle
      try_reexport:
        description: Try Paddle Python PIR->legacy static re-export before opt
        required: true
        default: 'true'

permissions:
  contents: write

env:
  PHASE: V172-Q389R8A-R4
  OUT_DIR: build/q389r8a_r4

jobs:
  build:
    name: Build and publish Paddle Lite .nb proof bundle
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout MathPro source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install artifact acquisition dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests huggingface_hub
          if [ "${{ github.event.inputs.try_reexport }}" = "true" ]; then
            python -m pip install paddlepaddle==3.0.0 || python -m pip install paddlepaddle || true
          fi

      - name: Multi-optimizer Paddle Lite .nb proof sweep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRY_REEXPORT: ${{ github.event.inputs.try_reexport }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euxo pipefail
          mkdir -p "$OUT_DIR/work" "$OUT_DIR/reports" "$OUT_DIR/bundle"
          python - <<'PY'
          import gzip
          import hashlib
          import json
          import os
          import re
          import shutil
          import stat
          import subprocess
          import sys
          import tarfile
          import zipfile
          from pathlib import Path

          import requests
          from huggingface_hub import snapshot_download

          phase = os.environ.get('PHASE', 'V172-Q389R8A-R4')
          out_dir = Path(os.environ.get('OUT_DIR', 'build/q389r8a_r4'))
          work = out_dir / 'work'
          reports = out_dir / 'reports'
          bundle = out_dir / 'bundle'
          for p in (work, reports, bundle):
              p.mkdir(parents=True, exist_ok=True)

          HF_TOKEN = os.environ.get('HF_TOKEN') or None
          GH_TOKEN = os.environ.get('GITHUB_TOKEN') or None
          TRY_REEXPORT = (os.environ.get('TRY_REEXPORT') or 'true').lower() == 'true'
          release_tag = os.environ.get('RELEASE_TAG') or 'q389r8a-r4-paddle-lite-multi-optimizer-formula-ocr-bundle'

          def run(cmd, cwd=None, timeout=240):
              try:
                  cp = subprocess.run(cmd, cwd=str(cwd) if cwd else None, text=True,
                                      stdout=subprocess.PIPE, stderr=subprocess.PIPE,
                                      timeout=timeout)
                  return {
                      'cmd': [str(x) for x in cmd],
                      'returncode': cp.returncode,
                      'stdoutTail': cp.stdout[-5000:],
                      'stderrTail': cp.stderr[-5000:],
                  }
              except subprocess.TimeoutExpired as exc:
                  return {
                      'cmd': [str(x) for x in cmd],
                      'returncode': 'timeout',
                      'stdoutTail': (exc.stdout or '')[-5000:] if isinstance(exc.stdout, str) else '',
                      'stderrTail': (exc.stderr or '')[-5000:] if isinstance(exc.stderr, str) else '',
                  }
              except Exception as exc:
                  return {'cmd': [str(x) for x in cmd], 'returncode': 'exception', 'error': repr(exc)}

          def sha256(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          def is_probably_executable(path):
              if not path.is_file():
                  return False
              name = path.name.lower()
              if name in {'opt', 'paddle_lite_opt', 'model_optimize_tool'}:
                  return True
              if 'opt' in name and path.stat().st_size > 100000:
                  return True
              if 'model_optimize' in name and path.stat().st_size > 100000:
                  return True
              return False

          def unpack_asset(src, dest):
              dest.mkdir(parents=True, exist_ok=True)
              src_lower = src.name.lower()
              info = {'src': str(src), 'dest': str(dest)}
              try:
                  if zipfile.is_zipfile(src):
                      with zipfile.ZipFile(src) as zf:
                          zf.extractall(dest)
                      info['kind'] = 'zip'
                  elif tarfile.is_tarfile(src):
                      with tarfile.open(src) as tf:
                          tf.extractall(dest)
                      info['kind'] = 'tar'
                  elif src_lower.endswith('.gz'):
                      out = dest / src.name[:-3]
                      with gzip.open(src, 'rb') as fi, open(out, 'wb') as fo:
                          shutil.copyfileobj(fi, fo)
                      info['kind'] = 'gz'
                  else:
                      out = dest / 'opt'
                      shutil.copy2(src, out)
                      info['kind'] = 'raw'
                  return info
              except Exception as exc:
                  info['error'] = repr(exc)
                  return info

          def find_nb(output_root):
              candidates = []
              if output_root.is_file() and output_root.stat().st_size > 0:
                  candidates.append(output_root)
              if (output_root.with_suffix('.nb')).is_file():
                  candidates.append(output_root.with_suffix('.nb'))
              if output_root.exists() and output_root.is_dir():
                  candidates.extend([p for p in output_root.rglob('*') if p.is_file() and p.stat().st_size > 0 and (p.suffix == '.nb' or p.name.endswith('.nb'))])
                  if not candidates:
                      candidates.extend([p for p in output_root.rglob('*') if p.is_file() and p.stat().st_size > 100000])
              return max(candidates, key=lambda p: p.stat().st_size) if candidates else None

          report = {
              'phase': phase,
              'status': 'STARTED',
              'paddleLiteOptimizers': [],
              'optimizerDiscoveryAttempts': [],
              'modelSnapshots': [],
              'attempts': [],
              'selectedArtifact': None,
          }

          # Discover Paddle Lite optimizer binaries from GitHub release assets.
          session = requests.Session()
          if GH_TOKEN:
              session.headers.update({'Authorization': f'Bearer {GH_TOKEN}'})
          api_url = 'https://api.github.com/repos/PaddlePaddle/Paddle-Lite/releases?per_page=100'
          releases = []
          try:
              r = session.get(api_url, timeout=30)
              r.raise_for_status()
              releases = r.json()
              report['optimizerDiscoveryAttempts'].append({'source': 'github_release_api', 'url': api_url, 'releaseCount': len(releases)})
          except Exception as exc:
              report['optimizerDiscoveryAttempts'].append({'source': 'github_release_api', 'url': api_url, 'error': repr(exc)})

          def tag_rank(tag):
              nums = [int(x) for x in re.findall(r'\d+', tag or '')]
              while len(nums) < 3:
                  nums.append(0)
              # prefer newer versions and rc if only newer asset has PIR support
              return tuple(nums[:3])

          asset_rows = []
          for rel in releases:
              tag = rel.get('tag_name') or ''
              for asset in rel.get('assets') or []:
                  name = asset.get('name') or ''
                  low = name.lower()
                  if 'macos' in low or 'darwin' in low or 'win' in low or 'aarch64' in low or 'android' in low:
                      continue
                  if not (low in {'opt_linux', 'opt_linux_x86'} or 'opt_linux' in low or 'model_optimize_tool' in low or 'build_opt' in low):
                      continue
                  score = 0
                  if low in {'opt_linux_x86', 'opt_linux'}:
                      score += 200
                  if 'opt_linux' in low:
                      score += 120
                  if 'model_optimize_tool' in low:
                      score += 80
                  if 'build_opt' in low:
                      score += 60
                  score_tuple = (score, tag_rank(tag), tag, name)
                  asset_rows.append((score_tuple, tag, name, asset.get('browser_download_url')))
          asset_rows.sort(reverse=True)
          report['optimizerDiscoveryAttempts'].append({
              'source': 'github_release_api',
              'stage': 'asset_rank',
              'assetCount': len(asset_rows),
              'topAssets': [[s[0], tag, name, url] for s, tag, name, url in asset_rows[:30]],
          })

          optimizer_candidates = []
          seen_urls = set()
          for _, tag, name, url in asset_rows[:18]:
              if not url or url in seen_urls:
                  continue
              seen_urls.add(url)
              adir = work / 'paddle_lite_release_assets' / tag / re.sub(r'[^A-Za-z0-9_.-]+', '_', name)
              adir.mkdir(parents=True, exist_ok=True)
              raw = adir / name
              entry = {'source': 'github_release_asset', 'tag': tag, 'asset': name, 'url': url}
              try:
                  with session.get(url, stream=True, timeout=60) as resp:
                      resp.raise_for_status()
                      with open(raw, 'wb') as f:
                          for chunk in resp.iter_content(chunk_size=1024 * 1024):
                              if chunk:
                                  f.write(chunk)
                  entry['downloadedBytes'] = raw.stat().st_size
                  extract = adir / 'extract'
                  entry['unpack'] = unpack_asset(raw, extract)
                  for p in extract.rglob('*'):
                      if is_probably_executable(p):
                          p.chmod(p.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
                          probe = run([str(p), '--help'], timeout=20)
                          entry.setdefault('candidates', []).append({'path': str(p), 'sizeBytes': p.stat().st_size, 'probeReturncode': probe.get('returncode'), 'probeStdoutTail': (probe.get('stdoutTail') or '')[-1200:], 'probeStderrTail': (probe.get('stderrTail') or '')[-1200:]})
                          # --help returns 1 for gflags; stdout containing optimize_out is enough.
                          joined = (probe.get('stdoutTail') or '') + (probe.get('stderrTail') or '')
                          if 'optimize_out' in joined or 'valid_targets' in joined or p.name in {'opt', 'model_optimize_tool'}:
                              optimizer_candidates.append({'path': p, 'tag': tag, 'asset': name, 'url': url})
                  report['optimizerDiscoveryAttempts'].append(entry)
              except Exception as exc:
                  entry['error'] = repr(exc)
                  report['optimizerDiscoveryAttempts'].append(entry)

          # Deduplicate optimizer paths.
          dedup = []
          seen = set()
          for c in optimizer_candidates:
              key = str(c['path'].resolve())
              if key not in seen:
                  seen.add(key)
                  dedup.append(c)
          optimizer_candidates = dedup
          report['paddleLiteOptimizers'] = [{k: (str(v) if isinstance(v, Path) else v) for k, v in c.items()} for c in optimizer_candidates]

          if not optimizer_candidates:
              report['status'] = 'NO_PADDLE_LITE_OPTIMIZER_BINARY_FOUND'
              (reports / 'q389r8a_r4_report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
              print(json.dumps(report, indent=2))
              sys.exit(1)

          # Download model snapshots.
          repos = ['PaddlePaddle/PP-FormulaNet_plus-S', 'PaddlePaddle/PP-FormulaNet-S']
          model_infos = []
          for repo in repos:
              slug = repo.lower().replace('/', '_').replace('-', '_')
              local_dir = work / slug / 'snapshot'
              snap_info = {'repo': repo, 'localDir': str(local_dir)}
              try:
                  snapshot_download(repo_id=repo, repo_type='model', revision='main', local_dir=str(local_dir),
                                    allow_patterns=['inference.json','inference.pdiparams','inference.pdmodel','*.pdmodel','*.pdiparams','*.json','__model__','model','params','*.txt'],
                                    token=HF_TOKEN)
                  files = sorted([str(p.relative_to(local_dir)) for p in local_dir.rglob('*') if p.is_file()])
                  snap_info['passed'] = True
                  snap_info['files'] = files
                  report['modelSnapshots'].append(snap_info)
              except Exception as exc:
                  snap_info['passed'] = False
                  snap_info['error'] = repr(exc)
                  report['modelSnapshots'].append(snap_info)
                  continue

              model_files = []
              for name in ['inference.pdmodel', 'model.pdmodel', '__model__', 'model', 'inference.json', 'model.json']:
                  p = local_dir / name
                  if p.exists() and p.is_file():
                      model_files.append(p)
              param_files = []
              for name in ['inference.pdiparams', 'model.pdiparams', 'params']:
                  p = local_dir / name
                  if p.exists() and p.is_file():
                      param_files.append(p)
              for p in local_dir.rglob('*.pdmodel'):
                  if p not in model_files:
                      model_files.append(p)
              for p in local_dir.rglob('*.pdiparams'):
                  if p not in param_files:
                      param_files.append(p)
              for p in local_dir.rglob('*.json'):
                  if p not in model_files and ('inference' in p.name.lower() or 'model' in p.name.lower()):
                      model_files.append(p)

              # Optional Paddle Python re-export attempts from inference.json + params to legacy-like files.
              reexport_pairs = []
              if TRY_REEXPORT and (local_dir / 'inference.json').exists() and (local_dir / 'inference.pdiparams').exists():
                  rex_dir = work / slug / 'paddle_reexport'
                  rex_dir.mkdir(parents=True, exist_ok=True)
                  script = rex_dir / 'reexport.py'
                  script.write_text(r'''
import json, os, sys, traceback
from pathlib import Path
try:
    import paddle
    paddle.enable_static()
    place = paddle.CPUPlace()
    exe = paddle.static.Executor(place)
    model_dir = Path(sys.argv[1])
    out_prefix = str(Path(sys.argv[2]) / 'legacy_inference')
    result = {'ok': False, 'paddleVersion': getattr(paddle, '__version__', None)}
    try:
        loaded = paddle.static.io.load_inference_model(
            path_prefix=None,
            executor=exe,
            model_dir=str(model_dir),
            model_filename='inference.json',
            params_filename='inference.pdiparams',
        )
    except TypeError:
        loaded = paddle.static.io.load_inference_model(
            str(model_dir), exe,
            model_filename='inference.json',
            params_filename='inference.pdiparams',
        )
    program, feed_names, fetch_targets = loaded
    result['feedNames'] = feed_names
    result['fetchCount'] = len(fetch_targets) if fetch_targets is not None else None
    try:
        paddle.static.io.save_inference_model(
            out_prefix,
            feed_names,
            fetch_targets,
            exe,
            program=program,
        )
    except TypeError:
        paddle.static.save_inference_model(
            out_prefix,
            feed_names,
            fetch_targets,
            exe,
            program=program,
        )
    result['ok'] = True
    result['outPrefix'] = out_prefix
    result['files'] = sorted([p.name for p in Path(sys.argv[2]).glob('*')])
    print(json.dumps(result))
except Exception as e:
    print(json.dumps({'ok': False, 'error': repr(e), 'trace': traceback.format_exc()[-4000:]}))
    sys.exit(2)
''', encoding='utf-8')
                  rr = run([sys.executable, str(script), str(local_dir), str(rex_dir)], timeout=180)
                  snap_info['reexportAttempt'] = rr
                  try:
                      js = json.loads((rr.get('stdoutTail') or '').strip().splitlines()[-1])
                  except Exception:
                      js = None
                  snap_info['reexportResult'] = js
                  if js and js.get('ok'):
                      # Try common generated file pairs.
                      for mp in [rex_dir / 'legacy_inference.pdmodel', rex_dir / 'legacy_inference.json', rex_dir / 'legacy_inference']:
                          for pp in [rex_dir / 'legacy_inference.pdiparams', rex_dir / 'legacy_inference.params']:
                              if mp.exists() and pp.exists():
                                  reexport_pairs.append((mp, pp, 'paddle_reexport'))

              # Also add alias layouts for PIR json, in case newer opt supports names but not inference.json.
              pairs = []
              for mf in model_files:
                  for pf in (param_files or [None]):
                      pairs.append((mf, pf, 'snapshot'))
              pairs.extend(reexport_pairs)

              for mf, pf, source_kind in pairs:
                  model_format = 'pir_json' if mf and mf.suffix == '.json' else ('legacy_or_unknown' if mf else 'dir')
                  for opt in optimizer_candidates:
                      for target in ['', 'arm', 'x86']:
                          for mode in ['files_naive_buffer', 'files_default', 'dir_naive_buffer', 'dir_default', 'alias_dir_naive_buffer']:
                              if mode.startswith('files') and (not mf or not pf):
                                  continue
                              attempt_name = f"{repo.replace('/','_')}_{source_kind}_{opt['tag']}_{opt['asset']}_{mode}_{target or 'no_target'}"
                              safe = re.sub(r'[^A-Za-z0-9_.-]+', '_', attempt_name)[:160]
                              attempt_dir = work / slug / 'lite_attempts' / safe
                              attempt_dir.mkdir(parents=True, exist_ok=True)
                              out_prefix = attempt_dir / 'formula_ocr'
                              cmd = [str(opt['path'])]
                              alias_info = None
                              if mode.startswith('dir'):
                                  cmd.append(f'--model_dir={local_dir}')
                              elif mode.startswith('alias_dir'):
                                  alias = attempt_dir / 'alias_model_dir'
                                  alias.mkdir(parents=True, exist_ok=True)
                                  if mf:
                                      shutil.copy2(mf, alias / ('model.pdmodel' if mf.suffix == '.json' else mf.name))
                                  if pf:
                                      shutil.copy2(pf, alias / 'model.pdiparams')
                                  alias_info = {'aliasDir': str(alias), 'aliasFiles': sorted([p.name for p in alias.iterdir()])}
                                  cmd.append(f'--model_dir={alias}')
                              else:
                                  cmd += [f'--model_file={mf}', f'--param_file={pf}']
                              if 'naive_buffer' in mode:
                                  cmd.append('--optimize_out_type=naive_buffer')
                              cmd.append(f'--optimize_out={out_prefix}')
                              if target:
                                  cmd.append(f'--valid_targets={target}')
                              rr = run(cmd, timeout=120)
                              nb = find_nb(out_prefix.parent)
                              entry = {
                                  'repo': repo,
                                  'stage': 'paddle_lite_optimize',
                                  'passed': bool(nb),
                                  'sourceKind': source_kind,
                                  'optimizerTag': opt['tag'],
                                  'optimizerAsset': opt['asset'],
                                  'variant': f'{mode}_{target or "no_target"}',
                                  'modelFile': str(mf) if mf else None,
                                  'modelFileName': mf.name if mf else None,
                                  'modelFormatGuess': model_format,
                                  'paramFile': str(pf) if pf else None,
                                  'modelDir': str(local_dir),
                                  'aliasInfo': alias_info,
                                  'optimizerResult': rr,
                                  'nbFile': str(nb) if nb else None,
                                  'nbSizeBytes': nb.stat().st_size if nb else 0,
                              }
                              report['attempts'].append(entry)
                              if nb:
                                  final_nb = bundle / 'formula_ocr.nb'
                                  shutil.copy2(nb, final_nb)
                                  manifest = {
                                      'phase': phase,
                                      'modelFamily': 'PP-FormulaNet',
                                      'runtime': 'paddle-lite',
                                      'format': 'naive_buffer_nb',
                                      'fileName': final_nb.name,
                                      'sizeBytes': final_nb.stat().st_size,
                                      'sha256': sha256(final_nb),
                                      'sourceRepo': repo,
                                      'sourceKind': source_kind,
                                      'optimizerTag': opt['tag'],
                                      'optimizerAsset': opt['asset'],
                                      'optimizerUrl': opt.get('url'),
                                      'target': target or 'default',
                                      'variant': mode,
                                      'releaseTag': release_tag,
                                      'note': 'Artifact proves Paddle Lite opt produced a .nb file only. It does not prove Android OCR inference quality.',
                                  }
                                  (bundle / 'q389r8a_paddle_lite_bundle_manifest.json').write_text(json.dumps(manifest, indent=2), encoding='utf-8')
                                  report['status'] = 'PADDLE_LITE_NB_ARTIFACT_READY'
                                  report['selectedArtifact'] = manifest
                                  (reports / 'q389r8a_r4_report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
                                  print(json.dumps(report, indent=2))
                                  sys.exit(0)

          if not report['modelSnapshots'] or not any(s.get('passed') for s in report['modelSnapshots']):
              report['status'] = 'MODEL_SNAPSHOT_DOWNLOAD_FAILED'
          else:
              report['status'] = 'NO_PADDLE_LITE_NB_ARTIFACT_MULTI_OPTIMIZER_PIR_REEXPORT_SWEEP'
          (reports / 'q389r8a_r4_report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
          print(json.dumps(report, indent=2))
          sys.exit(1)
          PY

      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q389r8a_r4_paddle_lite_multi_optimizer_probe_report
          path: |
            build/q389r8a_r4/reports/**
            build/q389r8a_r4/bundle/**
          if-no-files-found: warn

      - name: Publish GitHub Release assets
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Q389R8A R4 Paddle Lite native Formula OCR .nb proof bundle
          files: |
            build/q389r8a_r4/bundle/formula_ocr.nb
            build/q389r8a_r4/bundle/q389r8a_paddle_lite_bundle_manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
