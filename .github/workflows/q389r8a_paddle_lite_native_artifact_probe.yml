name: Q389R8A R3 Paddle Lite PIR/static model optimizer probe bundle

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release only when a verified .nb artifact is produced"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      tag_name:
        description: "Release tag for the Paddle Lite bundle"
        required: true
        default: "q389r8a-r3-paddle-lite-pir-static-model-probe-bundle"

permissions:
  contents: write

jobs:
  build-and-publish-paddle-lite-bundle:
    name: Build and publish Paddle Lite .nb proof bundle
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout MathPro source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install artifact acquisition dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install huggingface_hub requests
          sudo apt-get update
          sudo apt-get install -y git cmake g++ gcc make unzip wget tar patchelf protobuf-compiler || true
          # Best-effort fallback: some Linux runners can expose paddle_lite_opt through the paddlelite wheel.
          python -m pip install paddlelite || true

      - name: Acquire PP-FormulaNet and require Paddle Lite .nb artifact
        run: |
          set -euxo pipefail
          mkdir -p build/q389r8a_r3/work build/q389r8a_r3/reports build/q389r8a_r3/bundle
          python - <<'PY'
          import json
          import os
          import shutil
          import stat
          import subprocess
          import hashlib
          from pathlib import Path
          from urllib.parse import urlparse
          import requests
          from huggingface_hub import snapshot_download

          PHASE = "V172-Q389R8A-R3"
          ROOT = Path("build/q389r8a_r3").resolve()
          WORK = ROOT / "work"
          REPORTS = ROOT / "reports"
          BUNDLE = ROOT / "bundle"
          WORK.mkdir(parents=True, exist_ok=True)
          REPORTS.mkdir(parents=True, exist_ok=True)
          BUNDLE.mkdir(parents=True, exist_ok=True)

          CANDIDATE_REPOS = [
              "PaddlePaddle/PP-FormulaNet_plus-S",
              "PaddlePaddle/PP-FormulaNet-S",
          ]
          DIRECT_OPT_URLS = [
              # Official Paddle-Lite docs use this direct Linux optimizer URL.
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.9.1/opt",
              # Conservative adjacent-version probes. They are allowed to fail; the report records each attempt.
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.10/opt",
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.11/opt",
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.12/opt",
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.13/opt",
              "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.8/opt",
          ]

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def run(cmd, cwd=None, timeout=300):
              p = subprocess.run(
                  [str(c) for c in cmd],
                  cwd=cwd,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  timeout=timeout,
              )
              return {
                  "cmd": [str(c) for c in cmd],
                  "returncode": p.returncode,
                  "stdoutTail": p.stdout[-6000:],
                  "stderrTail": p.stderr[-6000:],
              }

          def download_file(url: str, dest: Path):
              dest.parent.mkdir(parents=True, exist_ok=True)
              with requests.get(url, stream=True, allow_redirects=True, timeout=90) as r:
                  r.raise_for_status()
                  with dest.open("wb") as f:
                      for chunk in r.iter_content(chunk_size=1024 * 1024):
                          if chunk:
                              f.write(chunk)
              return dest

          def mark_executable(path: Path):
              mode = path.stat().st_mode
              path.chmod(mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

          def _probe_optimizer(path: Path, source: str, attempts: list, extra=None):
              extra = extra or {}
              try:
                  if not path.exists():
                      attempts.append({"source": source, "candidate": str(path), "stage": "missing", **extra})
                      return None
                  if path.is_file():
                      mark_executable(path)
                  probe = run([path, "--help"], timeout=90)
                  attempts.append({"source": source, "candidate": str(path), "sizeBytes": path.stat().st_size if path.is_file() else None, "probe": probe, **extra})
                  if probe["returncode"] in (0, 1):
                      return path
              except Exception as e:
                  attempts.append({"source": source, "candidate": str(path), "stage": "probe_error", "error": repr(e), **extra})
              return None

          def _candidate_optimizer_files(root: Path):
              if not root.exists():
                  return []
              names = {"opt", "paddle_lite_opt", "paddle-lite-opt", "model_optimize_tool"}
              found = []
              for p in root.rglob("*"):
                  if p.is_file() and p.name in names:
                      try:
                          if p.stat().st_size >= 64 * 1024:
                              found.append(p)
                      except OSError:
                          pass
              return sorted(set(found), key=lambda p: p.stat().st_size, reverse=True)

          def _try_release_asset_discovery(attempts):
              api = "https://api.github.com/repos/PaddlePaddle/Paddle-Lite/releases"
              headers = {"Accept": "application/vnd.github+json"}
              token = os.environ.get("GITHUB_TOKEN")
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              try:
                  resp = requests.get(api, params={"per_page": 100}, headers=headers, timeout=90)
                  resp.raise_for_status()
                  releases = resp.json()
                  assets = []
                  for rel in releases:
                      tag = rel.get("tag_name") or rel.get("name") or ""
                      for a in rel.get("assets", []) or []:
                          name = a.get("name") or ""
                          url = a.get("browser_download_url") or ""
                          low = name.lower()
                          score = 0
                          if "opt" in low: score += 100
                          if "linux" in low or "x86" in low: score += 20
                          if low.endswith((".tgz", ".tar.gz", ".zip", ".tar")): score += 10
                          if score:
                              assets.append((score, tag, name, url))
                  assets.sort(reverse=True)
                  attempts.append({"source": "github_release_api", "stage": "asset_discovery", "assetCount": len(assets), "topAssets": assets[:20]})
                  for score, tag, name, url in assets[:30]:
                      dest = WORK / "paddle_lite_release_assets" / tag / name
                      try:
                          download_file(url, dest)
                          extracted = dest.parent / (dest.name + "_extract")
                          extracted.mkdir(parents=True, exist_ok=True)
                          unpack = run(["bash", "-lc", f"set -e; file '{dest}'; case '{dest}' in *.zip) unzip -q '{dest}' -d '{extracted}' ;; *.tar.gz|*.tgz) tar -xzf '{dest}' -C '{extracted}' ;; *.tar) tar -xf '{dest}' -C '{extracted}' ;; *) cp '{dest}' '{extracted}/opt' ;; esac"], timeout=300)
                          attempts.append({"source": "github_release_asset", "tag": tag, "asset": name, "url": url, "downloadedBytes": dest.stat().st_size, "unpack": unpack})
                          for cand in _candidate_optimizer_files(extracted) + _candidate_optimizer_files(dest.parent):
                              ok = _probe_optimizer(cand, "github_release_asset", attempts, {"tag": tag, "asset": name, "url": url})
                              if ok:
                                  return ok
                      except Exception as e:
                          attempts.append({"source": "github_release_asset", "tag": tag, "asset": name, "url": url, "stage": "download_unpack_or_probe", "error": repr(e)})
              except Exception as e:
                  attempts.append({"source": "github_release_api", "stage": "list_releases", "error": repr(e)})
              return None

          def _try_source_build_optimizer(attempts):
              src_dir = WORK / "Paddle-Lite-source"
              try:
                  if not src_dir.exists():
                      clone = run(["git", "clone", "--depth", "1", "--branch", "develop", "https://github.com/PaddlePaddle/Paddle-Lite.git", src_dir], timeout=900)
                      attempts.append({"source": "source_build", "stage": "git_clone", "cmdResult": clone})
                      if clone["returncode"] != 0:
                          return None
                  # Build a Linux x86 optimizer. This is heavier than release download but deterministic when assets are not published as a bare /opt file.
                  build_script = src_dir / "lite" / "tools" / "build_linux.sh"
                  build_cmd = ["bash", str(build_script), "--arch=x86", "--toolchain=gcc", "--with_extra=ON", "--with_cv=OFF", "--with_log=ON"]
                  env_prefix = "export LITE_BUILD_THREADS=2; export PYTHON_BIN=$(which python); "
                  build = run(["bash", "-lc", env_prefix + " ".join([str(x) for x in build_cmd])], cwd=src_dir, timeout=7200)
                  attempts.append({"source": "source_build", "stage": "build_linux_x86_optimizer", "cmd": build_cmd, "cmdResult": build})
                  # Even if build exits non-zero, scan the tree because opt may have been produced before a packaging/test failure.
                  candidates = _candidate_optimizer_files(src_dir)
                  attempts.append({"source": "source_build", "stage": "scan_candidates", "candidateCount": len(candidates), "candidates": [str(p) for p in candidates[:25]]})
                  for cand in candidates:
                      ok = _probe_optimizer(cand, "source_build", attempts)
                      if ok:
                          return ok
              except Exception as e:
                  attempts.append({"source": "source_build", "stage": "exception", "error": repr(e)})
              return None

          def find_paddle_lite_opt():
              attempts = []
              for exe in ["paddle_lite_opt", "opt", "model_optimize_tool"]:
                  which = shutil.which(exe)
                  if which:
                      ok = _probe_optimizer(Path(which), "pip_or_path", attempts, {"exe": exe})
                      if ok:
                          return ok, attempts
              for url in DIRECT_OPT_URLS:
                  name = Path(urlparse(url).path).name or "opt"
                  dest = WORK / "paddle_lite_opt_downloads" / urlparse(url).path.replace("/", "_")
                  try:
                      download_file(url, dest)
                      if dest.stat().st_size < 64 * 1024:
                          attempts.append({"source": "direct_github_release", "url": url, "stage": "too_small", "sizeBytes": dest.stat().st_size})
                          continue
                      ok = _probe_optimizer(dest, "direct_github_release", attempts, {"url": url})
                      if ok:
                          return ok, attempts
                  except Exception as e:
                      attempts.append({"source": "direct_github_release", "url": url, "stage": "download_or_probe", "error": repr(e)})
              ok = _try_release_asset_discovery(attempts)
              if ok:
                  return ok, attempts
              ok = _try_source_build_optimizer(attempts)
              if ok:
                  return ok, attempts
              return None, attempts

          def find_model_files(model_dir: Path):
              # PP-FormulaNet HF repos currently expose Paddle 3/PIR-style `inference.json`
              # plus `inference.pdiparams`, not always legacy `inference.pdmodel`.
              # R8A-R2 proved optimizer discovery, but failed because `.pdmodel` was absent.
              model_candidates = []
              model_candidates.extend(model_dir.rglob("*.pdmodel"))
              model_candidates.extend(model_dir.rglob("__model__"))
              model_candidates.extend(model_dir.rglob("inference.json"))
              model_candidates.extend(model_dir.rglob("model.json"))
              # Keep generic json candidates as a last-resort probe only; tokenizer/config json should lose by score.
              model_candidates.extend([p for p in model_dir.rglob("*.json") if p.name.lower() not in {"config.json", "tokenizer_config.json", "special_tokens_map.json"}])
              pdparams = list(model_dir.rglob("*.pdiparams")) + list(model_dir.rglob("*.pdparams"))
              def score_model(p: Path):
                  name = p.name.lower()
                  parent = p.parent.name.lower()
                  legacy = 0 if name == "inference.pdmodel" else 1
                  pir = 0 if name == "inference.json" else 1
                  modelish = 0 if "model" in name or "inference" in name or name == "__model__" else 1
                  parent_score = 0 if "inference" in parent else 1
                  return (legacy, pir, modelish, parent_score, len(str(p)))
              def score_param(p: Path):
                  name = p.name.lower()
                  parent = p.parent.name.lower()
                  return (0 if name == "inference.pdiparams" else 1, 0 if "inference" in parent else 1, len(str(p)))
              return (sorted(set(model_candidates), key=score_model)[0] if model_candidates else None,
                      sorted(pdparams, key=score_param)[0] if pdparams else None)

          def summarize_snapshot_files(root: Path):
              rows = []
              for p in sorted([x for x in root.rglob("*") if x.is_file()], key=lambda x: str(x)):
                  try:
                      rows.append({"path": str(p.relative_to(root)), "sizeBytes": p.stat().st_size})
                  except Exception:
                      rows.append({"path": str(p), "sizeBytes": None})
              return rows[:200]

          def copy_metadata_files(src_root: Path, dest_root: Path):
              copied = []
              patterns = ["*vocab*", "*dict*", "*token*", "*json", "*.txt", "*.yml", "*.yaml"]
              for pattern in patterns:
                  for p in src_root.rglob(pattern):
                      if p.is_file() and p.stat().st_size < 20 * 1024 * 1024:
                          out = dest_root / p.name
                          if out.exists():
                              continue
                          shutil.copy2(p, out)
                          copied.append(out.name)
              return copied

          def locate_nb(out_base: Path):
              roots = [out_base.parent, out_base]
              found = []
              for root in roots:
                  if root.exists():
                      found.extend(root.glob("*.nb"))
                      found.extend(root.rglob("*.nb"))
              found = sorted(set(found), key=lambda p: p.stat().st_size if p.exists() else 0, reverse=True)
              return found[0] if found else None

          opt, opt_attempts = find_paddle_lite_opt()
          report = {
              "phase": PHASE,
              "status": "UNSET",
              "paddleLiteOptimizer": str(opt) if opt else None,
              "optimizerDiscoveryAttempts": opt_attempts,
              "attempts": [],
              "selectedArtifact": None,
          }

          if not opt:
              report["status"] = "NO_PADDLE_LITE_OPTIMIZER_BINARY_FOUND"
              (REPORTS / "q389r8a_r3_paddle_lite_artifact_report.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
              print(json.dumps(report, indent=2))
              raise SystemExit(1)

          selected = None
          for repo in CANDIDATE_REPOS:
              repo_key = repo.lower().replace("/", "_").replace("-", "_")
              model_root = WORK / repo_key / "snapshot"
              try:
                  local = Path(snapshot_download(
                      repo_id=repo,
                      repo_type="model",
                      local_dir=str(model_root),
                      allow_patterns=["*.pdmodel", "*.pdiparams", "*.pdparams", "__model__", "*.txt", "*.json", "*.yml", "*.yaml", "*vocab*", "*dict*", "*token*"],
                  ))
              except Exception as e:
                  report["attempts"].append({"repo": repo, "stage": "snapshot_download", "passed": False, "error": repr(e)})
                  continue

              model_file, param_file = find_model_files(local)
              if not model_file or not param_file:
                  report["attempts"].append({
                      "repo": repo,
                      "stage": "locate_model_files",
                      "passed": False,
                      "modelFile": str(model_file) if model_file else None,
                      "paramFile": str(param_file) if param_file else None,
                      "snapshotFiles": summarize_snapshot_files(local),
                  })
                  continue

              model_dir = model_file.parent
              command_variants = []
              for valid_target in [None, "arm", "x86"]:
                  for use_model_dir in [True, False]:
                      for optimize_out_type in ["naive_buffer", None]:
                          suffix = f"{'dir' if use_model_dir else 'files'}_{optimize_out_type or 'default'}_{valid_target or 'no_target'}"
                          out_base = WORK / repo_key / f"lite_{suffix}" / "formula_ocr"
                          out_base.parent.mkdir(parents=True, exist_ok=True)
                          cmd = [opt]
                          if use_model_dir:
                              cmd.append(f"--model_dir={model_dir}")
                          else:
                              cmd.extend([f"--model_file={model_file}", f"--param_file={param_file}"])
                          if optimize_out_type:
                              cmd.append(f"--optimize_out_type={optimize_out_type}")
                          cmd.append(f"--optimize_out={out_base}")
                          if valid_target:
                              cmd.append(f"--valid_targets={valid_target}")
                          command_variants.append((suffix, out_base, cmd))

              for suffix, out_base, cmd in command_variants:
                  result = run(cmd, timeout=900)
                  nb = locate_nb(out_base)
                  passed = result["returncode"] == 0 and nb is not None and nb.exists() and nb.stat().st_size > 1024 * 1024
                  attempt = {
                      "repo": repo,
                      "stage": "paddle_lite_optimize",
                      "passed": passed,
                      "variant": suffix,
                      "modelFile": str(model_file),
                      "modelFileName": model_file.name,
                      "modelFormatGuess": "pir_json" if model_file.suffix.lower() == ".json" else "legacy_paddle_static",
                      "paramFile": str(param_file),
                      "modelDir": str(model_dir),
                      "optimizerResult": result,
                      "nbFile": str(nb) if nb else None,
                      "nbSizeBytes": nb.stat().st_size if nb and nb.exists() else 0,
                  }
                  report["attempts"].append(attempt)
                  if passed:
                      selected = {"repo": repo, "nb": nb, "modelFile": model_file, "paramFile": param_file, "variant": suffix, "sourceRoot": local}
                      break
              if selected:
                  break

          if not selected:
              report["status"] = "NO_PADDLE_LITE_NB_ARTIFACT"
              (REPORTS / "q389r8a_r3_paddle_lite_artifact_report.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
              print(json.dumps(report, indent=2))
              raise SystemExit(1)

          nb = selected["nb"]
          nb_out = BUNDLE / "pp_formulanet_formula_ocr.nb"
          shutil.copy2(nb, nb_out)
          copied_meta = copy_metadata_files(selected["sourceRoot"], BUNDLE)

          model_sha = sha256_file(nb_out)
          model_size = nb_out.stat().st_size
          manifest = {
              "phase": PHASE,
              "bundleKind": "paddle-lite-native-formula-ocr-model",
              "modelFamily": "PP-FormulaNet",
              "sourceRepo": selected["repo"],
              "runtime": "paddle-lite",
              "format": "naive_buffer_nb",
              "target": "android-arm64-v8a-via-paddle-lite-arm",
              "model": {
                  "fileName": nb_out.name,
                  "sha256": model_sha,
                  "sizeBytes": model_size,
              },
              "metadataFiles": copied_meta,
              "installPolicy": {
                  "apkBundled": False,
                  "downloadOnly": True,
                  "privateStorageRequired": True,
                  "noBackend": True,
                  "noOnlineOcrApi": True,
                  "noFakeCandidates": True,
              },
              "proof": {
                  "paddleLiteOptimizerFound": True,
                  "paddleLiteOptimizerPath": str(opt),
                  "optimizerProducedNb": True,
                  "optimizerVariant": selected["variant"],
              },
          }
          (BUNDLE / "q389r8a_r3_paddle_lite_formula_ocr_bundle_manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          (BUNDLE / "q389r8a_r3_paddle_lite_preprocess_metadata.json").write_text(json.dumps({
              "phase": PHASE,
              "imageLayout": "NCHW",
              "channelOrder": "RGB",
              "normalization": "pending_app_runtime_binding_verification",
              "note": "Q389R8A-R1 proves native .nb acquisition only; app-side preprocessing must still be bound and verified on device.",
          }, indent=2), encoding="utf-8")
          report["status"] = "PADDLE_LITE_NB_ARTIFACT_READY"
          report["selectedArtifact"] = manifest
          (REPORTS / "q389r8a_r3_paddle_lite_artifact_report.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
          print(json.dumps(report, indent=2))
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: q389r8a-r3-paddle-lite-pir-static-artifact-report-and-bundle
          path: |
            build/q389r8a_r3/reports/**
            build/q389r8a_r3/bundle/**
          if-no-files-found: warn

      - name: Publish GitHub Release assets
        if: ${{ success() && inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euxo pipefail
          gh release delete "$TAG_NAME" --yes || true
          git tag -f "$TAG_NAME"
          git push -f origin "$TAG_NAME"
          gh release create "$TAG_NAME" \
            build/q389r8a_r3/bundle/* \
            build/q389r8a_r3/reports/q389r8a_r3_paddle_lite_artifact_report.json \
            --title "Q389R8A-R3 Paddle Lite PIR/static model probe bundle" \
            --notes "Q389R8A-R3 publishes only when a Paddle Lite .nb artifact is produced from PP-FormulaNet and verified by the optimizer workflow. This does not claim app-side OCR PASS."
