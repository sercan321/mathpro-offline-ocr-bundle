name: R832 Unified Exact Build Cache Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_toolchain_trigger/**'
      - '.github/workflows/r832_unified_exact_build_cache_export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1, show-progress: false}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10.18'}
      - name: Resolve unified exact build closure and replay offline
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="$RUNNER_TEMP/r832-unified-cache"
          mkdir -p "$ROOT/project/app/src/main/java/com/mathpro/prefetch" "$ROOT/project/app/src/main/python" "$ROOT/project/app/src/main/res/values" "$ROOT/export"
          curl --fail --location --retry 5 --retry-delay 3 --silent --show-error -o "$ROOT/gradle-8.7-bin.zip" https://services.gradle.org/distributions/gradle-8.7-bin.zip
          echo '544c35d6bd849ae8a5ed0bcea39ba677dc40f49df7d1835561582da2009b961d  gradle-8.7-bin.zip' > "$ROOT/expected.sha256"
          (cd "$ROOT" && sha256sum -c expected.sha256)
          unzip -q "$ROOT/gradle-8.7-bin.zip" -d "$ROOT"
          cat > "$ROOT/project/settings.gradle.kts" <<'EOF'
          pluginManagement { repositories { gradlePluginPortal(); google(); mavenCentral() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "r832_unified_exact_cache"
          include(":app")
          EOF
          sed -i 's/^          //' "$ROOT/project/settings.gradle.kts"
          cat > "$ROOT/project/build.gradle.kts" <<'EOF'
          plugins {
              id("org.gradle.kotlin.kotlin-dsl") version "4.3.0"
              id("com.android.application") version "8.6.1" apply false
              id("org.jetbrains.kotlin.android") version "2.1.0" apply false
              id("com.chaquo.python") version "17.0.0" apply false
          }
          EOF
          sed -i 's/^          //' "$ROOT/project/build.gradle.kts"
          cat > "$ROOT/project/app/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
              id 'com.chaquo.python'
          }
          android {
              namespace 'com.mathpro.prefetch'
              compileSdk 36
              ndkVersion '28.2.13676358'
              defaultConfig {
                  applicationId 'com.mathpro.prefetch'
                  minSdk 24
                  targetSdk 36
                  versionCode 1
                  versionName '1.0'
                  ndk { abiFilters 'arm64-v8a' }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          chaquopy {
              defaultConfig {
                  buildPython 'python3.10'
                  pip {
                      install 'mpmath==1.3.0'
                      install 'sympy==1.14.0'
                  }
                  pyc { src = false }
              }
          }
          dependencies {
              implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.20.0'
          }
          EOF
          sed -i 's/^          //' "$ROOT/project/app/build.gradle"
          cat > "$ROOT/project/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF
          cat > "$ROOT/project/app/src/main/res/values/styles.xml" <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/></resources>
          EOF
          cat > "$ROOT/project/app/src/main/java/com/mathpro/prefetch/MainActivity.kt" <<'EOF'
          package com.mathpro.prefetch
          import android.app.Activity
          class MainActivity : Activity()
          EOF
          echo 'def smoke(): return 1' > "$ROOT/project/app/src/main/python/main.py"
          export GRADLE_USER_HOME="$HOME/.gradle"
          cd "$ROOT/project"
          "$ROOT/gradle-8.7/bin/gradle" --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee "$ROOT/export/unified-online-build.log"
          test -f app/build/outputs/apk/debug/app-debug.apk
          "$ROOT/gradle-8.7/bin/gradle" --offline --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee "$ROOT/export/unified-offline-replay.log"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/org.gradle.kotlin/gradle-kotlin-dsl-plugins/4.3.0"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.6.1"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.1.0"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/com.chaquo.python/gradle/17.0.0"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/com.microsoft.onnxruntime/onnxruntime-android/1.20.0"
          tar --zstd -cf "$ROOT/export/unified-gradle-cache.tar.zst" -C "$HOME" .gradle
          split -b 300000000 -d -a 2 "$ROOT/export/unified-gradle-cache.tar.zst" "$ROOT/export/unified-gradle-cache.chunk-"
          rm "$ROOT/export/unified-gradle-cache.tar.zst"
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'unified-cache.*' -printf '%f\n' | sort | xargs sha256sum > unified-cache.sha256)
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'unified-cache.*' -printf '%f\n' | sort | xargs stat -c '%s %n' > unified-cache.size)
      - uses: actions/upload-artifact@v4
        with:
          name: r832-unified-cache-diagnostics
          path: |
            ${{ runner.temp }}/r832-unified-cache/export/*.log
            ${{ runner.temp }}/r832-unified-cache/export/unified-cache.sha256
            ${{ runner.temp }}/r832-unified-cache/export/unified-cache.size
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-00, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-00', compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-01, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-01', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-02, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-02', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-03, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-03', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-04, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-04', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-05, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-05', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-06, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-06', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-unified-cache-07, path: '${{ runner.temp }}/r832-unified-cache/export/unified-gradle-cache.chunk-07', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
