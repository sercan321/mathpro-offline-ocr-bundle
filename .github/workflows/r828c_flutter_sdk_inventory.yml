name: R828C Exact Flutter SDK Inventory

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/r828c_flutter_sdk_inventory.yml"

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TAG: r828c-flutter-pub-20260720-v1
      GH_TOKEN: ${{ github.token }}
      OUT: transfer/r828c-flutter-sdk-inventory
    steps:
      - uses: actions/checkout@v4
        with:
          ref: r828c-pub-cache-transfer-20260720
          fetch-depth: 1
      - name: Prepare
        shell: bash
        run: |
          set -euo pipefail
          rm -rf work "$OUT"
          mkdir -p work/downloads work/sdk "$OUT"
      - name: Download exact release parts
        id: download
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir work/downloads --pattern 'r828c-flutter-sdk.part-*' >"$OUT/download.stdout" 2>"$OUT/download.stderr"
          rc=$?
          echo "$rc" > "$OUT/download.rc"
          find work/downloads -maxdepth 1 -type f -printf '%f\t%s\n' | sort > "$OUT/downloaded_files.tsv"
          exit "$rc"
      - name: Reconstruct and extract
        id: extract
        if: steps.download.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          sha256sum work/downloads/* | sort > "$OUT/downloaded_parts.sha256"
          stat -c '%n\t%s' work/downloads/* | sort > "$OUT/downloaded_parts.size"
          cat work/downloads/r828c-flutter-sdk.part-* | tar --zstd -xf - -C work/sdk >"$OUT/extract.stdout" 2>"$OUT/extract.stderr"
          rc=$?
          echo "$rc" > "$OUT/extract.rc"
          exit "$rc"
      - name: Inventory
        id: inventory
        if: steps.extract.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          sdk=$(find work/sdk -mindepth 1 -maxdepth 3 -type f -path '*/bin/flutter' -printf '%h/..\n' | head -1)
          echo "sdk_candidate=$sdk" > "$OUT/sdk_candidate.txt"
          test -n "$sdk"
          sdk=$(realpath "$sdk")
          "$sdk/bin/flutter" --version > "$OUT/flutter_version.txt" 2>"$OUT/flutter_version.stderr"
          "$sdk/bin/dart" --version > "$OUT/dart_version.txt" 2>&1
          {
            echo "sdk=$sdk"
            echo "total_bytes=$(du -sb "$sdk" | awk '{print $1}')"
            echo "file_count=$(find "$sdk" -type f | wc -l)"
            echo "dir_count=$(find "$sdk" -type d | wc -l)"
          } > "$OUT/identity.txt"
          du -x -B1 -d 1 "$sdk" | sort -nr > "$OUT/du_depth1.tsv"
          du -x -B1 -d 2 "$sdk" | sort -nr > "$OUT/du_depth2.tsv"
          du -x -B1 -d 4 "$sdk/bin/cache" | sort -nr | head -400 > "$OUT/cache_du_top400.tsv"
          find "$sdk/bin/cache" -maxdepth 5 -type f -printf '%s\t%P\n' | sort -nr | head -500 > "$OUT/cache_files_top500.tsv"
          find "$sdk" -type f -printf '%s\t%P\n' | sort -nr | head -500 > "$OUT/all_files_top500.tsv"
          find "$sdk/bin/cache/artifacts/engine" -mindepth 1 -maxdepth 2 -type d -printf '%P\n' | sort > "$OUT/engine_dirs.txt"
          find "$sdk/bin/cache/artifacts/engine" -type f -printf '%s\t%P\n' | sort -nr > "$OUT/engine_files.tsv"
          echo 0 > "$OUT/inventory.rc"
      - name: Commit diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "download_outcome=${{ steps.download.outcome }}"
            echo "extract_outcome=${{ steps.extract.outcome }}"
            echo "inventory_outcome=${{ steps.inventory.outcome }}"
          } > "$OUT/outcomes.txt"
          git config user.name r828c-ci
          git config user.email r828c-ci@users.noreply.github.com
          git add "$OUT"
          git commit -m 'ci: record exact Flutter SDK inventory diagnostics' || true
          git push origin HEAD:r828c-pub-cache-transfer-20260720
