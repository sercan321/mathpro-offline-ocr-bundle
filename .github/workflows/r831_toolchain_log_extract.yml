name: R831 Toolchain Failure Extractor

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_log_extract_trigger/**'

permissions:
  actions: read
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Extract exact prefetch failure
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_JOB_ID: '89016159649'
        run: |
          set -Eeuo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o "$RUNNER_TEMP/source.log" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          python3 - "$RUNNER_TEMP/source.log" <<'PY'
          import pathlib,re,sys
          lines=pathlib.Path(sys.argv[1]).read_text(encoding='utf-8-sig',errors='replace').splitlines()
          rx=re.compile(r'(error|exception|failure|failed|what went wrong|could not|unresolved|line [0-9]+|process completed)',re.I)
          print('R831_SOURCE_LINE_COUNT',len(lines))
          print('=== TARGETED_FAILURE_LINES ===')
          for i,line in enumerate(lines,1):
              if rx.search(line): print(f'{i}: {line[:12000]}')
          print('=== FINAL_80 ===')
          for i in range(max(0,len(lines)-80),len(lines)): print(f'{i+1}: {lines[i][:12000]}')
          PY
