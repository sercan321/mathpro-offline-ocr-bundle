name: Q389R8C ONNX formula OCR encoder-decoder runtime probe

on:
  workflow_dispatch:
    inputs:
      candidates:
        description: 'Comma-separated HuggingFace repos to probe'
        required: false
        default: 'ningpp/PP-FormulaNet_plus-L-ONNX,ningpp/PP-FormulaNet-L-ONNX,alephpi/FormulaNet'
      max_download_size_mb:
        description: 'Soft per-file ONNX download guard in MB'
        required: false
        default: '900'

permissions:
  contents: write
  actions: read

jobs:
  probe-onnx-formula-runtime:
    name: Probe preconverted ONNX formula OCR runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install probe dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade huggingface_hub numpy onnx onnxruntime

      - name: Probe ONNX encoder/decoder runtime compatibility
        run: |
          set -euxo pipefail
          mkdir -p build/q389r8c/work build/q389r8c/reports build/q389r8c/bundle
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import shutil
          import traceback
          from pathlib import Path

          import numpy as np
          import onnx
          import onnxruntime as ort
          from huggingface_hub import HfApi, snapshot_download

          phase = 'V172-Q389R8C'
          root = Path('build/q389r8c')
          work = root / 'work'
          reports = root / 'reports'
          bundle = root / 'bundle'
          reports.mkdir(parents=True, exist_ok=True)
          bundle.mkdir(parents=True, exist_ok=True)
          token = os.environ.get('HF_TOKEN') or None
          candidates = [x.strip() for x in '${{ github.event.inputs.candidates }}'.split(',') if x.strip()]
          max_mb = int('${{ github.event.inputs.max_download_size_mb }}')
          max_bytes = max_mb * 1024 * 1024
          api = HfApi(token=token)

          def sha256_file(p: Path):
              h = hashlib.sha256()
              with p.open('rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          def tail_text(text, n=4000):
              if text is None:
                  return ''
              text = str(text)
              return text[-n:]

          def read_json(path: Path):
              try:
                  return json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  return {}

          def collect_config(snapshot: Path):
              cfg = {}
              for rel in ['config.json', 'onnx/config.json', 'generation_config.json', 'onnx/generation_config.json']:
                  p = snapshot / rel
                  if p.exists():
                      data = read_json(p)
                      if isinstance(data, dict):
                          cfg.update(data)
              return cfg

          def dim_value(dim):
              try:
                  if isinstance(dim, int) and dim > 0:
                      return int(dim)
              except Exception:
                  pass
              return None

          def fixed_shape_for_input(name, rank, raw_shape, cfg):
              lname = name.lower()
              hidden = int(cfg.get('d_model') or cfg.get('hidden_size') or cfg.get('decoder_hidden_size') or 768)
              heads = int(cfg.get('decoder_attention_heads') or cfg.get('num_attention_heads') or cfg.get('num_heads') or 12)
              head_dim = max(1, hidden // max(1, heads))

              # name-specific shapes used by HF/Optimum VisionEncoderDecoder exports
              if any(k in lname for k in ['pixel', 'image', 'input_image', 'x']) and rank == 4:
                  return [1, 3, 384, 384]
              if 'encoder_hidden' in lname or 'encoder_outputs' in lname or lname.endswith('hidden_states'):
                  return [1, 1, hidden]
              if 'input_ids' in lname or 'decoder_input_ids' in lname or lname == 'ids':
                  return [1, 1]
              if 'attention_mask' in lname:
                  return [1, 1]
              if 'use_cache' in lname or 'cache_branch' in lname:
                  return [] if rank == 0 else [1]
              if 'past_key_values' in lname or lname.startswith('past.') or '.key' in lname or '.value' in lname:
                  # Common decoder past KV tensor: [batch, num_heads, past_seq, head_dim]
                  if rank == 4:
                      return [1, heads, 1, head_dim]
                  if rank == 5:
                      return [2, 1, heads, 1, head_dim]
                  return [1 for _ in range(rank)]

              # rank fallback with dynamic dims replaced
              if rank == 0:
                  return []
              if rank == 1:
                  return [dim_value(raw_shape[0]) or 1]
              if rank == 2:
                  return [dim_value(raw_shape[0]) or 1, dim_value(raw_shape[1]) or 1]
              if rank == 3:
                  return [dim_value(raw_shape[0]) or 1, dim_value(raw_shape[1]) or 1, dim_value(raw_shape[2]) or hidden]
              if rank == 4:
                  return [dim_value(raw_shape[0]) or 1, dim_value(raw_shape[1]) or 3, dim_value(raw_shape[2]) or 384, dim_value(raw_shape[3]) or 384]
              return [dim_value(x) or 1 for x in raw_shape]

          def np_dtype_from_ort_type(type_str):
              s = str(type_str).lower()
              if 'float16' in s:
                  return np.float16
              if 'float' in s or 'double' in s:
                  return np.float32
              if 'int64' in s:
                  return np.int64
              if 'int32' in s:
                  return np.int32
              if 'bool' in s:
                  return np.bool_
              return np.float32

          def make_input_array(inp, cfg):
              name = inp.name
              raw_shape = list(inp.shape or [])
              rank = len(raw_shape)
              dtype = np_dtype_from_ort_type(inp.type)
              shape = fixed_shape_for_input(name, rank, raw_shape, cfg)
              lname = name.lower()
              if dtype == np.bool_:
                  return np.array(False, dtype=np.bool_) if shape == [] else np.zeros(shape, dtype=np.bool_)
              if np.issubdtype(dtype, np.integer):
                  return np.ones(shape, dtype=dtype)
              if 'pixel' in lname or 'image' in lname or lname in ['x', 'input']:
                  return np.zeros(shape, dtype=dtype)
              return np.zeros(shape, dtype=dtype)

          def describe_session_inputs_outputs(session):
              def d(v):
                  return {'name': v.name, 'type': str(v.type), 'shape': [str(x) for x in (v.shape or [])]}
              return {
                  'inputs': [d(x) for x in session.get_inputs()],
                  'outputs': [d(x) for x in session.get_outputs()],
              }

          def run_onnx_model(model_path: Path, cfg: dict):
              record = {
                  'path': str(model_path),
                  'fileName': model_path.name,
                  'sizeBytes': model_path.stat().st_size,
                  'sha256': sha256_file(model_path),
                  'checkerPassed': False,
                  'sessionCreated': False,
                  'runPassed': False,
              }
              try:
                  m = onnx.load(str(model_path))
                  onnx.checker.check_model(m)
                  record['checkerPassed'] = True
              except Exception as e:
                  record['checkerError'] = tail_text(repr(e))
              try:
                  so = ort.SessionOptions()
                  so.graph_optimization_level = ort.GraphOptimizationLevel.ORT_ENABLE_BASIC
                  session = ort.InferenceSession(str(model_path), sess_options=so, providers=['CPUExecutionProvider'])
                  record['sessionCreated'] = True
                  record.update(describe_session_inputs_outputs(session))
              except Exception as e:
                  record['sessionError'] = tail_text(traceback.format_exc())
                  return record
              try:
                  feeds = {inp.name: make_input_array(inp, cfg) for inp in session.get_inputs()}
                  record['dummyFeedShapes'] = {k: list(v.shape) for k, v in feeds.items()}
                  outputs = session.run(None, feeds)
                  record['runPassed'] = True
                  record['outputShapes'] = [list(getattr(o, 'shape', [])) for o in outputs]
                  record['outputDTypes'] = [str(getattr(o, 'dtype', '')) for o in outputs]
              except Exception as e:
                  record['runError'] = tail_text(traceback.format_exc(), 6000)
              return record

          def classify_onnx(rel):
              r = rel.lower()
              if 'encoder' in r:
                  return 'encoder'
              if 'decoder' in r:
                  return 'decoder'
              return 'single_or_unknown'

          repo_reports = []
          selected = None
          for repo in candidates:
              rrec = {'repo': repo, 'stage': 'start', 'passed': False}
              repo_safe = re.sub(r'[^A-Za-z0-9_.-]+', '_', repo.lower())
              try:
                  infos = api.list_repo_files(repo_id=repo, repo_type='model')
                  onnx_files = [f for f in infos if f.lower().endswith('.onnx')]
                  json_files = [f for f in infos if f.lower().endswith('.json')]
                  rrec.update({
                      'stage': 'list_repo_files',
                      'fileCount': len(infos),
                      'onnxFiles': onnx_files,
                      'jsonFiles': json_files[:20],
                      'sampleFiles': infos[:30],
                  })
                  if not onnx_files:
                      rrec['stage'] = 'no_onnx_files'
                      repo_reports.append(rrec)
                      continue
                  # filter extremely huge files using file metadata when available
                  allow_patterns = sorted(set(onnx_files + json_files + ['*.txt', '*.model', 'vocab.*', 'merges.txt', 'special_tokens_map.json', 'tokenizer_config.json', 'tokenizer.json']))
                  snap = Path(snapshot_download(repo_id=repo, repo_type='model', allow_patterns=allow_patterns, token=token, local_dir=work / repo_safe / 'snapshot'))
                  cfg = collect_config(snap)
                  model_records = []
                  for rel in onnx_files:
                      p = snap / rel
                      if not p.exists():
                          model_records.append({'path': rel, 'stage': 'not_downloaded'})
                          continue
                      if p.stat().st_size > max_bytes:
                          model_records.append({'path': rel, 'stage': 'skipped_size_guard', 'sizeBytes': p.stat().st_size, 'maxBytes': max_bytes})
                          continue
                      rec = run_onnx_model(p, cfg)
                      rec['role'] = classify_onnx(rel)
                      rec['relativePath'] = rel
                      model_records.append(rec)
                  encoder_pass = any(x.get('role') == 'encoder' and x.get('runPassed') for x in model_records)
                  decoder_pass = any(x.get('role') == 'decoder' and x.get('runPassed') for x in model_records)
                  single_pass = any(x.get('role') == 'single_or_unknown' and x.get('runPassed') for x in model_records)
                  ready = (encoder_pass and decoder_pass) or single_pass
                  rrec.update({
                      'stage': 'runtime_probe',
                      'passed': bool(ready),
                      'encoderRunPassed': bool(encoder_pass),
                      'decoderRunPassed': bool(decoder_pass),
                      'singleRunPassed': bool(single_pass),
                      'models': model_records,
                  })
                  if ready and selected is None:
                      selected = {
                          'repo': repo,
                          'snapshot': str(snap),
                          'models': [x for x in model_records if x.get('runPassed')],
                          'config': cfg,
                      }
              except Exception as e:
                  rrec['stage'] = 'exception'
                  rrec['passed'] = False
                  rrec['error'] = tail_text(traceback.format_exc(), 8000)
              repo_reports.append(rrec)

          if selected:
              status = 'ONNX_FORMULA_OCR_RUNTIME_ARTIFACT_READY'
              selected_dir = Path(selected['snapshot'])
              bundle_model_dir = bundle / 'onnx_formula_ocr'
              bundle_model_dir.mkdir(parents=True, exist_ok=True)
              for item in selected['models']:
                  src = Path(item['path'])
                  if src.exists():
                      dst = bundle_model_dir / src.name
                      shutil.copy2(src, dst)
              for rel in ['config.json', 'generation_config.json', 'tokenizer.json', 'tokenizer_config.json', 'special_tokens_map.json', 'processor_config.json', 'merges.txt', 'vocab.json']:
                  src = selected_dir / rel
                  if src.exists():
                      shutil.copy2(src, bundle_model_dir / src.name)
              manifest = {
                  'phase': phase,
                  'bundleKind': 'onnx_encoder_decoder_formula_ocr_runtime_probe',
                  'repo': selected['repo'],
                  'files': [],
              }
              for p in sorted(bundle_model_dir.iterdir()):
                  if p.is_file():
                      manifest['files'].append({'name': p.name, 'sizeBytes': p.stat().st_size, 'sha256': sha256_file(p)})
              (bundle / 'q389r8c_onnx_formula_ocr_bundle_manifest.json').write_text(json.dumps(manifest, indent=2), encoding='utf-8')
          else:
              status = 'NO_ONNX_FORMULA_OCR_RUNTIME_ARTIFACT'

          report = {
              'phase': phase,
              'status': status,
              'candidates': candidates,
              'selectedArtifact': selected and {'repo': selected['repo'], 'models': selected['models']},
              'repoReports': repo_reports,
          }
          (reports / 'q389r8c_onnx_formula_runtime_report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
          print(json.dumps(report, indent=2))
          if not selected:
              raise SystemExit(1)
          PY

      - name: Upload Q389R8C report and bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q389r8c-onnx-formula-runtime-report-and-bundle
          path: |
            build/q389r8c/reports/**
            build/q389r8c/bundle/**
          if-no-files-found: warn

      - name: Publish Q389R8C proof release if runtime-ready
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: q389r8c-onnx-formula-runtime-ready-bundle
          name: Q389R8C ONNX formula runtime-ready bundle
          files: |
            build/q389r8c/bundle/**
