name: R832 Flutter Kotlin DSL Cache Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_toolchain_trigger/**'
      - '.github/workflows/r832_flutter_kotlin_dsl_cache_export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1, show-progress: false}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - name: Resolve Flutter kotlin-dsl 4.3.0 and replay offline
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="$RUNNER_TEMP/r832-flutter-kotlin-dsl"
          mkdir -p "$ROOT/project" "$ROOT/export"
          curl --fail --location --retry 5 --retry-delay 3 --silent --show-error -o "$ROOT/gradle-8.7-bin.zip" https://services.gradle.org/distributions/gradle-8.7-bin.zip
          echo '544c35d6bd849ae8a5ed0bcea39ba677dc40f49df7d1835561582da2009b961d  gradle-8.7-bin.zip' > "$ROOT/expected.sha256"
          (cd "$ROOT" && sha256sum -c expected.sha256)
          unzip -q "$ROOT/gradle-8.7-bin.zip" -d "$ROOT"
          cat > "$ROOT/project/settings.gradle.kts" <<'EOF'
          pluginManagement { repositories { gradlePluginPortal(); google(); mavenCentral() } }
          rootProject.name = "r832_flutter_kotlin_dsl_cache"
          EOF
          sed -i 's/^          //' "$ROOT/project/settings.gradle.kts"
          cat > "$ROOT/project/build.gradle.kts" <<'EOF'
          plugins { id("org.gradle.kotlin.kotlin-dsl") version "4.3.0" }
          EOF
          sed -i 's/^          //' "$ROOT/project/build.gradle.kts"
          export GRADLE_USER_HOME="$HOME/.gradle"
          cd "$ROOT/project"
          "$ROOT/gradle-8.7/bin/gradle" --no-daemon help 2>&1 | tee "$ROOT/export/kotlin-dsl-resolution.log"
          "$ROOT/gradle-8.7/bin/gradle" --offline --no-daemon help 2>&1 | tee "$ROOT/export/kotlin-dsl-offline-replay.log"
          test -d "$GRADLE_USER_HOME/caches/modules-2/files-2.1/org.gradle.kotlin/gradle-kotlin-dsl-plugins/4.3.0"
          tar --zstd -cf "$ROOT/export/kotlin-dsl-cache.tar.zst" -C "$HOME" .gradle
          split -b 300000000 -d -a 2 "$ROOT/export/kotlin-dsl-cache.tar.zst" "$ROOT/export/kotlin-dsl-cache.chunk-"
          rm "$ROOT/export/kotlin-dsl-cache.tar.zst"
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'kotlin-dsl-cache.*' -printf '%f\n' | sort | xargs sha256sum > kotlin-dsl-cache.sha256)
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'kotlin-dsl-cache.*' -printf '%f\n' | sort | xargs stat -c '%s %n' > kotlin-dsl-cache.size)
      - uses: actions/upload-artifact@v4
        with:
          name: r832-kotlin-dsl-diagnostics
          path: |
            ${{ runner.temp }}/r832-flutter-kotlin-dsl/export/*.log
            ${{ runner.temp }}/r832-flutter-kotlin-dsl/export/kotlin-dsl-cache.sha256
            ${{ runner.temp }}/r832-flutter-kotlin-dsl/export/kotlin-dsl-cache.size
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with: {name: r832-kotlin-dsl-cache-00, path: '${{ runner.temp }}/r832-flutter-kotlin-dsl/export/kotlin-dsl-cache.chunk-00', compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-kotlin-dsl-cache-01, path: '${{ runner.temp }}/r832-flutter-kotlin-dsl/export/kotlin-dsl-cache.chunk-01', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
