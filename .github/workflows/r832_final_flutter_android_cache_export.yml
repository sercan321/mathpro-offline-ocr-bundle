name: R832 Final Flutter Android Cache Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_toolchain_trigger/**'
      - '.github/workflows/r832_final_flutter_android_cache_export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1, show-progress: false}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10.18'}
      - name: Resolve pinned Flutter and exact Android closure with offline replay
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="$RUNNER_TEMP/r832-final-cache"
          mkdir -p "$ROOT/download" "$ROOT/flutter" "$ROOT/pub" "$ROOT/export"
          cd "$ROOT/download"
          BASE='https://github.com/sercan321/mathpro-offline-ocr-bundle/releases/download/r828c-flutter-pub-20260720-v1'
          for name in r828c-flutter-sdk.part-000 r828c-flutter-sdk.part-001 r828c-flutter-sdk.part-002 r828c-pub-cache.tar.zst; do
            curl --fail --location --retry 5 --retry-delay 3 --silent --show-error -o "$name" "$BASE/$name"
          done
          cat > expected.sha256 <<'EOF'
          5249d692b8a010c5baa896156960797e496d8a82b85b1274620ee52454e335c7  r828c-flutter-sdk.part-000
          2425d14baed134099a05709381d01b690641b940e4c16ad8ba1293b007dd1455  r828c-flutter-sdk.part-001
          1ff82df19da82d950aac9991a38ec8cd613dcdf737881b902364ec9e862fdc02  r828c-flutter-sdk.part-002
          0adf3b6d075948408e70c13da6580f8ccd7cdeecdde06a91e545b9ca53a8a417  r828c-pub-cache.tar.zst
          EOF
          sed -i 's/^          //' expected.sha256
          sha256sum -c expected.sha256 | tee "$ROOT/export/flutter-pub-hash-verification.log"
          cat r828c-flutter-sdk.part-000 r828c-flutter-sdk.part-001 r828c-flutter-sdk.part-002 > flutter-sdk.tar.zst
          tar --zstd -xf flutter-sdk.tar.zst -C "$ROOT/flutter"
          tar --zstd -xf r828c-pub-cache.tar.zst -C "$ROOT/pub"
          FLUTTER_BIN="$(find "$ROOT/flutter" -type f -path '*/bin/flutter' -print -quit)"
          PUB_MARKER="$(find "$ROOT/pub" -type d -path '*/hosted/pub.dev' -print -quit)"
          test -n "$FLUTTER_BIN"; test -n "$PUB_MARKER"
          FLUTTER_ROOT="$(dirname "$(dirname "$FLUTTER_BIN")")"
          PUB_CACHE="$(dirname "$(dirname "$PUB_MARKER")")"
          export FLUTTER_ROOT PUB_CACHE PATH="$FLUTTER_ROOT/bin:$PATH"
          git config --global --add safe.directory "$FLUTTER_ROOT"
          dart pub get --offline --enforce-lockfile --example --directory "$FLUTTER_ROOT/packages/flutter_tools" 2>&1 | tee "$ROOT/export/flutter-tools-relocation.log"
          flutter --version --machine | tee "$ROOT/export/flutter-version.json"
          flutter config --no-analytics
          flutter create --platforms=android --org com.mathpro.prefetch "$ROOT/project"
          cat > "$ROOT/project/pubspec.yaml" <<'EOF'
          name: r832_final_cache_project
          publish_to: none
          environment:
            sdk: '>=3.12.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF
          sed -i 's/^          //' "$ROOT/project/pubspec.yaml"
          cd "$ROOT/project"
          flutter pub get --offline
          rm -f android/settings.gradle.kts android/app/build.gradle.kts
          cat > android/settings.gradle <<'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file('local.properties').withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty('flutter.sdk')
                  assert flutterSdkPath != null, 'flutter.sdk not set in local.properties'
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins {
              id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
              id 'com.android.application' version '8.6.1' apply false
              id 'org.jetbrains.kotlin.android' version '2.1.0' apply false
              id 'com.chaquo.python' version '17.0.0' apply false
          }
          include ':app'
          EOF
          sed -i 's/^          //' android/settings.gradle
          cat > android/app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
              id 'dev.flutter.flutter-gradle-plugin'
              id 'com.chaquo.python'
          }
          android {
              namespace 'com.mathpro.prefetch'
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion
              defaultConfig {
                  applicationId 'com.mathpro.prefetch'
                  minSdk 24
                  targetSdk flutter.targetSdkVersion
                  versionCode 1
                  versionName '1.0'
                  ndk { abiFilters 'arm64-v8a' }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          chaquopy {
              defaultConfig {
                  buildPython 'python3.10'
                  pip {
                      install 'mpmath==1.3.0'
                      install 'sympy==1.14.0'
                  }
                  pyc { src = false }
              }
          }
          dependencies { implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.20.0' }
          flutter { source '../..' }
          EOF
          sed -i 's/^          //' android/app/build.gradle
          mkdir -p android/app/src/main/python
          echo 'def smoke(): return 1' > android/app/src/main/python/main.py
          flutter build apk --debug --target-platform android-arm64 2>&1 | tee "$ROOT/export/final-cache-online-build.log"
          test -f build/app/outputs/flutter-apk/app-debug.apk
          cd android
          ./gradlew --offline --no-daemon assembleDebug 2>&1 | tee "$ROOT/export/final-cache-offline-replay.log"
          cd ..
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.2.20"
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.gradle.kotlin/gradle-kotlin-dsl-plugins/4.3.0"
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.6.1"
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.1.0"
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.chaquo.python/gradle/17.0.0"
          test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.microsoft.onnxruntime/onnxruntime-android/1.20.0"
          tar --zstd -cf "$ROOT/export/final-gradle-cache.tar.zst" -C "$HOME" .gradle
          split -b 300000000 -d -a 2 "$ROOT/export/final-gradle-cache.tar.zst" "$ROOT/export/final-gradle-cache.chunk-"
          rm "$ROOT/export/final-gradle-cache.tar.zst"
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'final-cache.*' -printf '%f\n' | sort | xargs sha256sum > final-cache.sha256)
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'final-cache.*' -printf '%f\n' | sort | xargs stat -c '%s %n' > final-cache.size)
      - uses: actions/upload-artifact@v4
        with:
          name: r832-final-cache-diagnostics
          path: |
            ${{ runner.temp }}/r832-final-cache/export/*.log
            ${{ runner.temp }}/r832-final-cache/export/*.json
            ${{ runner.temp }}/r832-final-cache/export/final-cache.sha256
            ${{ runner.temp }}/r832-final-cache/export/final-cache.size
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-00, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-00', compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-01, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-01', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-02, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-02', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-03, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-03', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-04, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-04', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-05, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-05', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-06, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-06', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        with: {name: r832-final-cache-07, path: '${{ runner.temp }}/r832-final-cache/export/final-gradle-cache.chunk-07', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
