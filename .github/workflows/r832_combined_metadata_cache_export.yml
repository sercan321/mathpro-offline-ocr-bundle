name: R832 Combined Metadata Cache Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/r831_toolchain_trigger/**'
      - '.github/workflows/r832_combined_metadata_cache_export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.18'

      - name: Resolve all Flutter and app build dependencies in one metadata store
        id: resolve
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ROOT="$RUNNER_TEMP/r832-combined-cache"
          mkdir -p "$ROOT/download" "$ROOT/flutter" "$ROOT/pub" "$ROOT/export"
          {
            set -Eeuxo pipefail
            cd "$ROOT/download"
            BASE='https://github.com/sercan321/mathpro-offline-ocr-bundle/releases/download/r828c-flutter-pub-20260720-v1'
            for name in r828c-flutter-sdk.part-000 r828c-flutter-sdk.part-001 r828c-flutter-sdk.part-002 r828c-pub-cache.tar.zst; do
              curl --fail --location --retry 5 --retry-delay 3 --silent --show-error -o "$name" "$BASE/$name"
            done
            cat > expected.sha256 <<'EOF'
          5249d692b8a010c5baa896156960797e496d8a82b85b1274620ee52454e335c7  r828c-flutter-sdk.part-000
          2425d14baed134099a05709381d01b690641b940e4c16ad8ba1293b007dd1455  r828c-flutter-sdk.part-001
          1ff82df19da82d950aac9991a38ec8cd613dcdf737881b902364ec9e862fdc02  r828c-flutter-sdk.part-002
          0adf3b6d075948408e70c13da6580f8ccd7cdeecdde06a91e545b9ca53a8a417  r828c-pub-cache.tar.zst
          EOF
            sed -i 's/^          //' expected.sha256
            sha256sum -c expected.sha256 | tee "$ROOT/export/flutter-pub-hash-verification.log"
            cat r828c-flutter-sdk.part-000 r828c-flutter-sdk.part-001 r828c-flutter-sdk.part-002 > flutter-sdk.tar.zst
            tar --zstd -xf flutter-sdk.tar.zst -C "$ROOT/flutter"
            tar --zstd -xf r828c-pub-cache.tar.zst -C "$ROOT/pub"
            FLUTTER_BIN="$(find "$ROOT/flutter" -type f -path '*/bin/flutter' -print -quit)"
            PUB_MARKER="$(find "$ROOT/pub" -type d -path '*/hosted/pub.dev' -print -quit)"
            test -n "$FLUTTER_BIN"
            test -n "$PUB_MARKER"
            FLUTTER_ROOT="$(dirname "$(dirname "$FLUTTER_BIN")")"
            PUB_CACHE="$(dirname "$(dirname "$PUB_MARKER")")"
            export FLUTTER_ROOT PUB_CACHE PATH="$FLUTTER_ROOT/bin:$PATH"
            git config --global --add safe.directory "$FLUTTER_ROOT"
            dart pub get --offline --enforce-lockfile --example --directory "$FLUTTER_ROOT/packages/flutter_tools" | tee "$ROOT/export/flutter-tools-offline-relocation.log"
            flutter --version --machine | tee "$ROOT/export/flutter-version.json"
            flutter config --no-analytics
            flutter precache --android

            # First, use the stock Flutter 3.44.6 template. This is the already-proven
            # route which resolves the Flutter included-build Kotlin/AGP classpath.
            flutter create --platforms=android --org com.mathpro.prefetch "$ROOT/flutter_prefetch"
            cat > "$ROOT/flutter_prefetch/pubspec.yaml" <<'EOF'
          name: r832_combined_cache_prefetch
          publish_to: none
          environment:
            sdk: '>=3.12.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            camera: 0.10.6
            camera_android: 0.10.9+3
            flutter_math_fork: ^0.7.2
            http: ^1.2.2
            crypto: ^3.0.6
            path_provider: ^2.1.5
            shared_preferences: ^2.5.5
            webview_flutter: 4.7.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            integration_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
            sed -i 's/^          //' "$ROOT/flutter_prefetch/pubspec.yaml"
            cd "$ROOT/flutter_prefetch"
            flutter pub get --offline
            python3 - <<'PY'
          from pathlib import Path
          p = Path('android/settings.gradle.kts')
          s = p.read_text()
          s = s.replace(
              'id("org.jetbrains.kotlin.android") version',
              'id("com.chaquo.python") version "17.0.0" apply false\n    id("org.jetbrains.kotlin.android") version',
              1,
          )
          p.write_text(s)
          p = Path('android/app/build.gradle.kts')
          s = p.read_text()
          s = s.replace(
              'id("dev.flutter.flutter-gradle-plugin")',
              'id("dev.flutter.flutter-gradle-plugin")\n    id("com.chaquo.python")',
              1,
          )
          s = s.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24', 1)
          s = s.replace(
              'buildTypes {',
              'defaultConfig {\n        ndk { abiFilters += listOf("arm64-v8a") }\n    }\n\n    buildTypes {',
              1,
          )
          s += '\nchaquopy { defaultConfig { buildPython("python3.10"); pip { install("mpmath==1.3.0"); install("sympy==1.14.0") } } }\n'
          s += '\ndependencies { implementation("com.microsoft.onnxruntime:onnxruntime-android:1.20.0") }\n'
          p.write_text(s)
          PY
            mkdir -p android/app/src/main/python
            echo 'def smoke(): return 1' > android/app/src/main/python/main.py
            flutter build apk --debug --target-platform android-arm64 2>&1 | tee "$ROOT/export/flutter-prefetch-online-build.log"
            test -f build/app/outputs/flutter-apk/app-debug.apk
            (cd android && ./gradlew --offline --no-daemon assembleDebug) 2>&1 | tee "$ROOT/export/flutter-prefetch-offline-replay.log"

            # Then resolve the exact production project plugin versions in the SAME
            # GRADLE_USER_HOME so Gradle metadata indices remain coherent.
            mkdir -p "$ROOT/exact-plugins"
            cat > "$ROOT/exact-plugins/settings.gradle" <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          plugins {
              id 'com.android.application' version '8.6.1' apply false
              id 'org.jetbrains.kotlin.android' version '2.1.0' apply false
              id 'com.chaquo.python' version '17.0.0' apply false
          }
          rootProject.name = 'r832_exact_plugins'
          EOF
            sed -i 's/^          //' "$ROOT/exact-plugins/settings.gradle"
            cat > "$ROOT/exact-plugins/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application' apply false
              id 'org.jetbrains.kotlin.android' apply false
              id 'com.chaquo.python' apply false
          }
          EOF
            sed -i 's/^          //' "$ROOT/exact-plugins/build.gradle"
            cd "$ROOT/exact-plugins"
            "$ROOT/flutter_prefetch/android/gradlew" --no-daemon help 2>&1 | tee "$ROOT/export/exact-plugin-online-resolution.log"
            "$ROOT/flutter_prefetch/android/gradlew" --offline --no-daemon help 2>&1 | tee "$ROOT/export/exact-plugin-offline-replay.log"

            # Verify the exact dependency coordinates required by both Flutter's
            # included build and the production project.
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.2.20"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.0.0"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.11.1"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.6.1"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin/kotlin-gradle-plugin/2.1.0"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.chaquo.python/gradle/17.0.0"
            test -d "$HOME/.gradle/caches/modules-2/files-2.1/com.microsoft.onnxruntime/onnxruntime-android/1.20.0"
          } 2>&1 | tee "$ROOT/export/combined-resolve.log"

      - name: Package coherent cache and diagnostics
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="$RUNNER_TEMP/r832-combined-cache"
          mkdir -p "$ROOT/export" "$HOME/.gradle"
          printf 'RESOLVE_OUTCOME=%s\n' '${{ steps.resolve.outcome }}' | tee "$ROOT/export/combined-status.txt"
          tar --zstd -cf "$ROOT/export/combined-gradle-cache.tar.zst" -C "$HOME" .gradle
          split -b 300000000 -d -a 2 "$ROOT/export/combined-gradle-cache.tar.zst" "$ROOT/export/combined-gradle-cache.chunk-"
          rm "$ROOT/export/combined-gradle-cache.tar.zst"
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'combined-cache.*' -printf '%f\n' | sort | xargs sha256sum > combined-cache.sha256)
          (cd "$ROOT/export" && find . -maxdepth 1 -type f ! -name 'combined-cache.*' -printf '%f\n' | sort | xargs stat -c '%s %n' > combined-cache.size)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r832-combined-cache-diagnostics
          path: |
            ${{ runner.temp }}/r832-combined-cache/export/*.log
            ${{ runner.temp }}/r832-combined-cache/export/*.json
            ${{ runner.temp }}/r832-combined-cache/export/*.txt
            ${{ runner.temp }}/r832-combined-cache/export/combined-cache.sha256
            ${{ runner.temp }}/r832-combined-cache/export/combined-cache.size
          retention-days: 3

      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-00, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-00', compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-01, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-01', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-02, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-02', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-03, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-03', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-04, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-04', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-05, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-05', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-06, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-06', if-no-files-found: ignore, compression-level: 0, retention-days: 3}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: r832-combined-cache-07, path: '${{ runner.temp }}/r832-combined-cache/export/combined-gradle-cache.chunk-07', if-no-files-found: ignore, compression-level: 0, retention-days: 3}

      - name: Fail closed if resolution failed
        if: always()
        shell: bash
        run: test '${{ steps.resolve.outcome }}' = 'success'
