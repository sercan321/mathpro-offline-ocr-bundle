name: R828C Fanout Small Transfer Branches

on:
  push:
    branches: [r828c-pub-cache-transfer-20260720]
    paths:
      - "transfer/triggers/r828c_fanout_small_transfer_branches.trigger"

permissions:
  contents: write

jobs:
  fanout:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      SOURCE_ROOT: transfer/r828c-local-toolchain-v1
      BRANCH_PREFIX: r828c-xfer
      BATCH_SIZE: "25"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: r828c-pub-cache-transfer-20260720
          fetch-depth: 1
      - name: Create bounded payload branches and control index
        shell: bash
        run: |
          set -euo pipefail
          git config user.name r828c-ci
          git config user.email r828c-ci@users.noreply.github.com
          git config http.postBuffer 524288000
          git fetch origin main --depth=1
          test "$(cat "$SOURCE_ROOT/status.txt")" = PASS
          mapfile -t chunks < <(find "$SOURCE_ROOT/chunks" -type f | sort)
          test "${#chunks[@]}" -eq 750
          rm -rf work-fanout
          mkdir -p work-fanout
          : > work-fanout/index.tsv
          batch=0
          for ((i=0; i<${#chunks[@]}; i+=BATCH_SIZE)); do
            branch=$(printf '%s-%03d' "$BRANCH_PREFIX" "$batch")
            wt="work-fanout/wt-$batch"
            git worktree add --detach "$wt" origin/main
            git -C "$wt" checkout -B "$branch"
            mkdir -p "$wt/payload" "$wt/manifests"
            group=("${chunks[@]:i:BATCH_SIZE}")
            for source in "${group[@]}"; do
              rel=${source#"$SOURCE_ROOT/"}
              dest="$wt/payload/$rel"
              mkdir -p "$(dirname "$dest")"
              cp "$source" "$dest"
              printf '%s\t%s\n' "$rel" "$branch" >> work-fanout/index.tsv
            done
            cp "$SOURCE_ROOT/manifests/archives.sha256" "$wt/manifests/"
            cp "$SOURCE_ROOT/manifests/archives.size" "$wt/manifests/"
            cp "$SOURCE_ROOT/manifests/identity.txt" "$wt/manifests/"
            (cd "$wt" && find payload -type f -print0 | sort -z | xargs -0 sha256sum) > "$wt/manifests/payload.sha256"
            (cd "$wt" && find payload -type f -print0 | sort -z | xargs -0 stat -c '%n\t%s') > "$wt/manifests/payload.size"
            printf 'PASS\n' > "$wt/status.txt"
            git -C "$wt" add payload manifests status.txt
            git -C "$wt" commit -m "ci: bounded R828C transfer payload batch $batch"
            git -C "$wt" push --force origin "$branch"
            git worktree remove --force "$wt"
            batch=$((batch+1))
          done

          control="$BRANCH_PREFIX-control"
          wt=work-fanout/control
          git worktree add --detach "$wt" origin/main
          git -C "$wt" checkout -B "$control"
          mkdir -p "$wt/manifests"
          cp "$SOURCE_ROOT/manifests/"* "$wt/manifests/"
          cp work-fanout/index.tsv "$wt/index.tsv"
          {
            echo "status=PASS"
            echo "payload_branch_count=$batch"
            echo "chunk_count=${#chunks[@]}"
            echo "batch_size=$BATCH_SIZE"
            echo "source_completion=$(cat "$SOURCE_ROOT/manifests/completion.txt" | tr '\n' ';')"
          } > "$wt/status.txt"
          git -C "$wt" add manifests index.tsv status.txt
          git -C "$wt" commit -m 'ci: publish R828C bounded transfer control index'
          git -C "$wt" push --force origin "$control"
          git worktree remove --force "$wt"
