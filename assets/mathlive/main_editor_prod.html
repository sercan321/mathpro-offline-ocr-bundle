<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MathPro Production MathLive Editor</title>
  <!-- V172-Q185: production MathLive HTML finalization. Minimal runtime path only; no diagnostic court UI. -->
  <!-- V172-Q190R2: production active-path hardening inlines MathLive static/font CSS before app surface CSS. -->
  <!-- V172-Q190R8: production static asset truth strips missing local @font-face url(fonts/*.woff2) rules before inline load. -->
  <!-- V172-Q192: native MathLive field owns caret/focus/slot selection; Flutter does not draw a replacement cursor overlay. -->
  <!-- V172-Q196: official MathLive/KaTeX font files are bundled and embedded into inline CSS as data URLs. -->
  <!-- V172-Q201: native MathLive math-field owns visible caret/focus/slot selection; Flutter mirror/overlay override is forbidden. -->
  <!-- V172-Q203: final static production freeze marker; Android PASS remains external evidence. -->
  <style id="mathpro-inline-mathlive-fonts-css">
__MATHPRO_INLINE_MATHLIVE_FONTS_CSS__
  </style>
  <style id="mathpro-inline-mathlive-static-css">
__MATHPRO_INLINE_MATHLIVE_STATIC_CSS__
  </style>
  <style>
    :root {
      color-scheme: dark;
      --mathpro-accent: #7fc7b8;
      --mathpro-bg: #0b0f12;
      --mathpro-text: #f4fbf8;
      --mathpro-muted: rgba(244, 251, 248, 0.62);
    }
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--mathpro-bg);
      color: var(--mathpro-text);
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: contain;
      touch-action: manipulation;
      pointer-events: auto;
    }
    #mathpro-editor-host {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: stretch;
      padding: 7px 10px;
      overflow: hidden;
      min-width: 0;
      pointer-events: auto;
      background: var(--mathpro-bg);
    }
    math-field {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 62px;
      display: block;
      color: var(--mathpro-text);
      background: transparent;
      border: 0;
      outline: none;
      font-family: KaTeX_Main, KaTeX_Math, "Noto Sans Math", "STIX Two Math", "Cambria Math", serif;
      /* Q389R6G: Fotomath-like compact editor scale; native MathLive caret remains authoritative. */
      /* Q389R6H: long-expression policy keeps a readable minimum scale, then scrolls horizontally. */
      /* Q389R6I: long-press cursor drag uses MathLive native offsets; no legacy Flutter cursor. */
      /* Q389R6R: real-device touch fallback attaches capture listeners without changing keyboard dispatch. */
      font-size: clamp(23px, 6.35vw, 31px);
      line-height: 1.20;
      padding: 5px 3px;
      overflow-x: auto;
      overflow-y: visible;
      white-space: nowrap;
      max-width: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scroll-padding-inline: 24px;
      touch-action: auto;
      pointer-events: auto;
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: none;
      caret-color: var(--mathpro-accent);
      --caret-color: var(--mathpro-accent);
      --selection-background-color: rgba(127, 199, 184, 0.24);
      --contains-highlight-background-color: rgba(127, 199, 184, 0.12);
      --placeholder-color: rgba(244, 251, 248, 0.42);
      --placeholder-background-color: rgba(127, 199, 184, 0.08);
    }
    math-field::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    math-field.mathpro-long-fit-normal {
      font-size: clamp(23px, 6.35vw, 31px);
    }
    math-field.mathpro-long-fit-compact {
      font-size: clamp(22px, 6.05vw, 30px);
    }
    math-field.mathpro-long-fit-dense,
    math-field.mathpro-long-fit-scroll {
      font-size: clamp(21px, 5.75vw, 28px);
    }
    body[data-mathpro-long-expression-fit="scroll"] math-field {
      font-size: clamp(21px, 5.75vw, 28px);
    }

    body[data-mathpro-long-press-cursor-dragging="Q389R6I"] {
      overscroll-behavior: contain;
      touch-action: none;
    }

    body[data-mathpro-long-press-cursor-dragging="Q389R6I"] math-field {
      touch-action: none;
      cursor: text;
      -webkit-touch-callout: none;
    }
    body[data-mathpro-flutter-external-cursor-dragging="Q389R6S"] {
      overscroll-behavior: contain;
      touch-action: none;
    }
    body[data-mathpro-flutter-external-cursor-dragging="Q389R6S"] math-field {
      touch-action: none;
      cursor: text;
      -webkit-touch-callout: none;
    }
    math-field::part(root),
    math-field::part(container),
    math-field::part(editable) {
      min-height: 54px;
      overflow: visible;
      touch-action: auto;
    }
    math-field::part(editable) {
      min-width: 0;
    }
    math-field::part(menu-toggle),
    math-field::part(virtual-keyboard-toggle) {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .ML__keyboard,
    .ML__keyboard-toggle,
    .ML__menu-toggle,
    .ML__popover,
    .ML__tooltip,
    math-virtual-keyboard,
    virtual-keyboard {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body data-mathpro-production-surface="V172-Q184" data-mathpro-production-html="V172-Q185" data-mathpro-caret-focus-slot-contract="V172-Q192" data-mathpro-official-font-bundle-closure="V172-Q196" data-mathpro-local-font-files-bundled="true" data-mathpro-official-font-data-urls="true" data-mathpro-hidden-chrome="true" data-mathpro-production-caret-focus-slot-finalization="V172-Q201"
  data-mathpro-final-static-production-freeze="V172-Q203" data-mathpro-native-caret-authority="mathlive" data-mathpro-workspace-compact-expression-scale="Q389R6G" data-mathpro-long-expression-scroll="Q389R6H" data-mathpro-long-expression-fit="normal" data-mathpro-long-press-cursor-drag="Q389R6I" data-mathpro-long-press-cursor-drag-hardening="Q389R6J" data-mathpro-long-press-cursor-drag-real-device-fallback="Q389R6R" data-mathpro-flutter-external-cursor-drag-bridge="Q389R6S" data-mathpro-external-cursor-drag-single-authority="Q389R6U" data-mathpro-external-cursor-drag-edge-reach="Q389R6V">
  <div id="mathpro-editor-host">
    <math-field id="mathlive-field" virtual-keyboard-mode="off" smart-mode smart-fence tabindex="0" data-mathpro-native-caret-authority="V172-Q201" data-mathpro-final-static-production-freeze="V172-Q203" data-mathpro-long-expression-scroll="Q389R6H" data-mathpro-external-cursor-drag-edge-reach="Q389R6V"></math-field>
  </div>
  <script>
__MATHPRO_INLINE_MATHLIVE_RUNTIME__
  </script>
  <script>
__MATHPRO_INLINE_PRODUCTION_BRIDGE__
  </script>
</body>
</html>
