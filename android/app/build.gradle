plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.mathpro.flutter'
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId 'com.mathpro.flutter'
        minSdk 23
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName

        // V172-Q389R6B: keep the camera/OCR runtime delivery arm64-only.
        // The PP-FormulaNet_plus-S ONNX model remains download-only/app-private;
        // only the approved ONNX Runtime Mobile dependency is packaged.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
}

// V172-Q345: package the approved Paddle Lite Java API jar; native .so files remain in src/main/jniLibs.
// V172-Q384: ONNX model artifacts are intentionally download-only and must not be bundled in the APK/AAB.
// V172-Q389R6B: add only the Android ONNX Runtime Mobile dependency; PP-FormulaNet_plus-S .onnx stays user-downloaded/app-private.
// V172-Q385: release packaging is constrained to arm64-v8a for the base native runtime.
dependencies {
    implementation files('libs/PaddlePredictor.jar')
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.20.0'
}

flutter {
    source '../..'
}
